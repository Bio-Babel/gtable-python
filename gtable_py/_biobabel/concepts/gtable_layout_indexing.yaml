id: gtable_py.gtable_layout_indexing
name: Mixed 0-based / 1-based indexing — the cardinal foot-gun
category: indexing-conventions
description: |
  gtable-python preserves R `gtable`'s 1-based, inclusive cell coordinates so
  porting from R is mechanical. But Python subscript syntax (`gt[i, j]`)
  follows the Python convention (0-based, half-open). The result: **the same
  Gtable uses two different index bases depending on the API.**

  This is the most common source of off-by-one bugs in gtable-python code.
invariants:
  - "`gt[i, j]` subscript access is **0-based** (Python convention)."
  - "`gtable_add_grob(t=..., l=..., b=..., r=...)` cell coordinates are **1-based**, **inclusive** at both ends."
  - "`gtable_add_rows(pos=...)` / `gtable_add_cols(pos=...)` are 1-based; `pos=0` inserts at the start, `pos=-1` inserts at the end (negative-from-end semantics)."
  - "The `.layout` dict field `t/l/b/r` stores 1-based inclusive."
  - "Iteration via `len(gt)` × `gt[i, j]` is 0-based; iterating via `for (t, l) in gt.layout[['t','l']]` is 1-based."
mental_model:
  for_r_users: |
    The 1-based coordinates are exactly R. The 0-based subscript is Python's
    addition.
  for_python_users: |
    Treat `(t, l, b, r)` as opaque "R-style" indices — never write expressions
    that compute on them assuming 0-based. When you want Python iteration,
    use the subscript form `gt[i, j]`.
  general: |
    Rule of thumb: anywhere you see `t=`, `l=`, `b=`, `r=` as keyword names,
    expect 1-based. Anywhere you see `[i, j]` subscripts, expect 0-based.
related_concepts:
  - gtable_py.Gtable
  - gtable_py.GtableCell
